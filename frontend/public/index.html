<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jared Fixes | Tech Help Made Simple</title>
  <meta name="description" content="Friendly, no-jargon IT support in Wexford and beyond — from quick fixes and device setup to smart AI help. Local or remote, Jared Fixes keeps things simple." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Work+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <!-- Hidden static form for Netlify build-time detection (React SPA requirement) -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="bot-field" />
    <input type="text" name="name" />
    <input type="email" name="email" />
    <input type="tel" name="phone" />
    <textarea name="message"></textarea>
  </form>

  <div id="root"></div>
</body>
</html>
